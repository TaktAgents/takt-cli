name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install & test
        run: |
          if [ -f package.json ]; then
            bun install
            bun test
          else
            echo "::notice::Нет package.json — CI-заготовка (см. задачу L-02). Пропуск."
          fi
